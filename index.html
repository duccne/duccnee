<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Trò Chơi Cổ Điển</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🕹️ Cổng Game Cổ Điển</h1>
        <p>Tuyển tập các trò chơi rèn luyện trí tuệ</p>
    </header>

    <main>
        <aside class="game-menu">
            <button class="menu-btn active">Cờ Caro</button>
            <button class="menu-btn" onclick="alert('Đang phát triển...')">Cờ Vua</button>
            <button class="menu-btn" onclick="alert('Đang phát triển...')">Rắn Săn Mồi</button>
        </aside>

        <section class="game-display">
            <div class="game-header">
                <h2>Cờ Caro (Tic-Tac-Toe)</h2>
                <div id="status">Lượt của: <span id="current-player">X</span></div>
                <button id="reset-btn">Chơi Lại</button>
            </div>
            
            <div class="board" id="board">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
