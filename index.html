<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Game Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="desktop">
        <div class="icon" onclick="openGame('Cờ Caro', 'caro.html', '❌⭕')">
            <div class="icon-img">❌⭕</div>
            <span class="icon-text">Cờ Caro</span>
        </div>

        <div class="icon" onclick="openGame('Cờ Vua', 'chess.html', '♟️')">
            <div class="icon-img">♟️</div>
            <span class="icon-text">Cờ Vua</span>
        </div>

        <div class="icon" onclick="openGame('Rắn Săn Mồi', 'snake.html', '🐍')">
            <div class="icon-img">🐍</div>
            <span class="icon-text">Rắn Săn Mồi</span>
        </div>
    </main>

    <div id="game-window" class="window hidden">
        <div class="window-header">
            <div class="window-title">
                <span id="window-icon">🎮</span>
                <span id="window-name">Tên Game</span>
            </div>
            <button class="close-btn" onclick="closeGame()">✖</button>
        </div>
        
        <div class="window-content">
            <iframe id="game-frame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <footer class="taskbar">
        <button class="start-btn">🪟 Start</button>
        
        <div class="taskbar-apps" id="taskbar-apps"></div>
        
        <div class="clock" id="clock">12:00 PM</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
