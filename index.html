<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS - Game Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="device-screen">
        
        <div id="home-screen" class="screen-view active">
            <div class="status-bar">
                <span>09:41 AM</span>
                <span>100% 🔋</span>
            </div>
            
            <div class="app-grid">
                <div class="app-icon" onclick="openApp('caro.html')">
                    <div class="icon-box" style="background: #3498db;">❌⭕</div>
                    <span class="app-name">Cờ Caro</span>
                </div>

                <div class="app-icon" onclick="openApp('chess.html')">
                    <div class="icon-box" style="background: #2c3e50;">♟️</div>
                    <span class="app-name">Cờ Vua</span>
                </div>

                <div class="app-icon" onclick="openApp('snake.html')">
                    <div class="icon-box" style="background: #2ecc71;">🐍</div>
                    <span class="app-name">Rắn Săn Mồi</span>
                </div>
            </div>
        </div>

        <div id="app-screen" class="screen-view">
            <iframe id="game-frame" src="" frameborder="0"></iframe>
            
            <button class="home-indicator" onclick="closeApp()">
                <div class="home-bar"></div>
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
