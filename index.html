<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nền Galaxy Chuyển Động</title>
    <style>
        /* CSS để canvas chiếm toàn bộ màn hình và ẩn thanh cuộn */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000; /* Màu nền đen mặc định */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="galaxyCanvas"></canvas>

<script>
    // Khởi tạo canvas và ngữ cảnh
    const canvas = document.getElementById('galaxyCanvas');
    const ctx = canvas.getContext('2d');

    // Đặt kích thước canvas bằng kích thước cửa sổ
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Cập nhật kích thước canvas khi thay đổi kích thước cửa sổ
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars(); // Khởi tạo lại các ngôi sao khi thay đổi kích thước
    });

    // Lớp Star (Ngôi sao)
    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2; // Kích thước hạt (ngôi sao)
            this.speedX = (Math.random() - 0.5) * 0.5; // Vận tốc theo trục X
            this.speedY = (Math.random() - 0.5) * 0.5; // Vận tốc theo trục Y
            
            // Màu sắc ngôi sao (pha trộn giữa trắng, xanh nhạt, vàng nhạt)
            const r = Math.floor(Math.random() * 200 + 55);
            const g = Math.floor(Math.random() * 200 + 55);
            const b = Math.floor(Math.random() * 255);
            this.color = `rgba(${r}, ${g}, ${b}, ${Math.random()})`;
        }

        // Vẽ ngôi sao
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.random() * Math.PI * 2);
            ctx.fill();
        }

        // Cập nhật vị trí ngôi sao
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            // Xử lý khi ngôi sao đi ra ngoài màn hình
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
    }

    // Mảng chứa các ngôi sao
    let stars = [];
    const numStars = 1000; // Số lượng ngôi sao

    // Hàm khởi tạo các ngôi sao
    function initStars() {
        stars = [];
        for (let i = 0; i < numStars; i++) {
            stars.push(new Star());
        }
    }

    // Hàm vẽ tinh vân (màu sắc mờ)
    function drawNebula() {
        // Tạo các vòng tròn mờ có màu sắc chuyển động
        for (let i = 0; i < 5; i++) {
            const time = Date.now() * 0.001; // Thời gian thực
            const r = (Math.sin(time + i * Math.PI * 0.5) + 1) * 127.5; // Đỏ biến thiên
            const g = (Math.sin(time + (i + 1) * Math.PI * 0.5) + 1) * 127.5; // Xanh lá biến thiên
            const b = (Math.sin(time + (i + 2) * Math.PI * 0.5) + 1) * 127.5; // Xanh dương biến thiên
            const color = `rgba(${r}, ${g}, ${b}, 0.02)`; // Độ mờ thấp

            ctx.fillStyle = color;
            ctx.beginPath();
            
            // Vị trí tinh vân biến thiên theo thời gian
            const x = (Math.sin(time * 0.1 + i) + 1) * 0.5 * canvas.width;
            const y = (Math.cos(time * 0.1 + i) + 1) * 0.5 * canvas.height;
            
            // Vẽ tinh vân lớn mờ
            ctx.arc(x, y, 400 + Math.sin(time * 0.5 + i) * 100, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Hàm hoạt ảnh chính
    function animate() {
        // Xóa canvas với hiệu ứng làm mờ để tạo vệt
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // Màu đen mờ
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawNebula(); // Vẽ tinh vân chuyển động

        // Vẽ và cập nhật từng ngôi sao
        for (let i = 0; i < stars.length; i++) {
            stars[i].draw();
            stars[i].update();
        }

        requestAnimationFrame(animate); // Gọi lại hàm animate trong khung hình tiếp theo
    }

    // Bắt đầu
    initStars(); // Khởi tạo các ngôi sao ban đầu
    animate(); // Chạy hoạt ảnh
</script>

</body>
</html>
